    <radialGradient id="glowPink" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(880 300) rotate(90) scale(320)">
      <stop stop-color="#FF75C5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FF75C5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(290 930) rotate(90) scale(280)">
      <stop stop-color="#FFC857" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#FFC857" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="duckBody" x1="500" y1="390" x2="680" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE97B"/>
      <stop offset="1" stop-color="#F6BC2D"/>
