      <rect x="730" y="645" width="88" height="130" rx="16" fill="#21153B" stroke="#B49BD5" stroke-width="4" transform="rotate(12 774 710)"/>
      <rect x="742" y="657" width="64" height="106" rx="10" fill="#2B1D49" transform="rotate(12 774 710)"/>

