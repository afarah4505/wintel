      </g>

      <g opacity="0" transform="translate(0 14)">
        <set attributeName="opacity" to="1" begin="2.9s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" values="0 14;0 0" begin="2.9s" dur="0.45s" fill="freeze"/>
        <path d="M495 760C485 700 485 650 500 620" stroke="#67B953" stroke-width="9" stroke-linecap="round"/>
        <path d="M530 782C525 720 527 665 545 632" stroke="#78C75F" stroke-width="9" stroke-linecap="round"/>
        <path d="M563 794C557 730 560 670 580 632" stroke="#65B84F" stroke-width="9" stroke-linecap="round"/>
        <path d="M597 796C595 730 601 676 623 635" stroke="#6FC257" stroke-width="9" stroke-linecap="round"/>
        <path d="M631 784C635 724 647 674 670 641" stroke="#7ACA66" stroke-width="9" stroke-linecap="round"/>
        <circle cx="497" cy="602" r="34" fill="#FF87CC"/>
        <circle cx="543" cy="618" r="30" fill="#FFC56B"/>
