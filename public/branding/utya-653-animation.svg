    <path d="M70 830C210 740 360 870 520 810C680 750 830 620 990 670C1070 700 1130 760 1170 730" stroke="#FFC86E" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g filter="url(#softShadow)">
