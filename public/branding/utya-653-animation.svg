      </line>
      <circle cx="208" cy="252" r="7" fill="#321257"/>

      <text x="208" y="412" text-anchor="middle" fill="#FFE39C" font-size="48" font-weight="800" font-family="Poppins, Avenir Next, Segoe UI, Arial, sans-serif">6:52
        <set attributeName="textContent" to="6:53" begin="2.8s" fill="freeze"/>
      </text>
      <text x="208" y="452" text-anchor="middle" fill="#FFB4DE" font-size="24" font-weight="700" font-family="Poppins, Avenir Next, Segoe UI, Arial, sans-serif" opacity="0">Tick!
        <set attributeName="opacity" to="1" begin="2.8s" fill="freeze"/>
      </text>
    </g>

