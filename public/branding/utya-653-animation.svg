      <line x1="208" y1="252" x2="170" y2="232" stroke="#5A2B8B" stroke-width="8" stroke-linecap="round"/>
      <line id="minuteHand" x1="208" y1="252" x2="246" y2="198" stroke="#7A3FC4" stroke-width="6" stroke-linecap="round">
        <animate attributeName="x2" begin="2.8s" dur="0.45s" fill="freeze" from="246" to="252"/>
