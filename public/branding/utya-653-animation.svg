      <rect x="784" y="148" width="272" height="224" rx="18" fill="#3A1768"/>
      <text x="920" y="275" text-anchor="middle" fill="#FFE68E" font-size="78" font-weight="800" font-family="Poppins, Avenir Next, Segoe UI, Arial, sans-serif">$SUTYA</text>
      <text x="920" y="327" text-anchor="middle" fill="#FFB0DA" font-size="28" font-weight="600" font-family="Poppins, Avenir Next, Segoe UI, Arial, sans-serif">Meme Duck Energy</text>
