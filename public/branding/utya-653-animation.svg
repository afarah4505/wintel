      <animateTransform attributeName="transform" type="translate" values="0 0;0 -8;0 0" begin="2.8s" dur="0.8s" repeatCount="indefinite"/>
      <circle cx="506" cy="470" r="8" fill="#FFF7D1"/>
      <circle cx="688" cy="452" r="8" fill="#FFF7D1"/>
      <circle cx="448" cy="550" r="7" fill="#FFB6DE"/>
    </g>

    <g>
